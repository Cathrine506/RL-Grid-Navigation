version: "3.9"

services:
  api:
    build: .
    image: rl-grid-navigation:latest
    container_name: rl_api
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./q_table.pkl:/app/q_table.pkl:ro
      - ./q_table_dynamic.pkl:/app/q_table_dynamic.pkl:ro
      - mlflow_data:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=mlruns
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rl_network

  app:
    build: .
    image: rl-grid-navigation:latest
    container_name: rl_streamlit
    ports:
      - "8501:8501"
    command: >
      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --logger.level=debug
    environment:
      - API_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rl_network

volumes:
  mlflow_data:

networks:
  rl_network:
    driver: bridge
