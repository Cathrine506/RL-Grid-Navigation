name: CI/CD – RL Grid Navigation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff (non-blocking)
        run: |
          pip install ruff
          ruff check api.py app.py || true

      - name: Smoke-test imports
        run: python -c "import api; import app; print('✓ All imports OK')"

  # ── 2. Build & Push Docker image ───────────────────────────────────────────
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Create dummy Q-tables if they don't exist (CI environment)
      - name: Create placeholder Q-tables
        run: |
          python -c "
          import pickle
          import os
          if not os.path.exists('q_table.pkl'):
              pickle.dump({}, open('q_table.pkl','wb'))
          if not os.path.exists('q_table_dynamic.pkl'):
              pickle.dump({}, open('q_table_dynamic.pkl','wb'))
          print('✓ Q-tables ready')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rl-grid-navigation:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rl-grid-navigation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Render (free cloud) ───────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  Skipping Render deployment (RENDER_DEPLOY_HOOK_URL not set)"
          else
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✓ Deploy hook triggered"
          fi
